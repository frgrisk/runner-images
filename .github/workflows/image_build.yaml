name: Image Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      x86_64:
        description: "Build x86_64 image"
        type: boolean
        default: true
      arm64:
        description: "Build arm64 image"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.pick.outputs.architectures }}
    steps:
      - name: Select architectures
        id: pick
        # Push to main builds x86_64 only. workflow_dispatch honors the
        # x86_64 / arm64 checkboxes (ticking neither builds nothing).
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo 'architectures=["x86_64"]' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          archs=()
          if [ "${{ github.event.inputs.x86_64 }}" = "true" ]; then archs+=(x86_64); fi
          if [ "${{ github.event.inputs.arm64 }}" = "true" ]; then archs+=(arm64); fi
          echo "architectures=$(jq -cn '$ARGS.positional' --args "${archs[@]}")" >> "$GITHUB_OUTPUT"

  ami-build:
    needs: setup
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        region: [us-east-2, ap-southeast-5]
        architecture: ${{ fromJSON(needs.setup.outputs.architectures) }}
    defaults:
      run:
        working-directory: ./images/ubuntu/templates
    steps:
      - uses: actions/checkout@v4

      - name: Setup `packer`
        uses: hashicorp/setup-packer@main
        id: setup
        with:
          version: latest

      - name: Run `packer init`
        id: init
        run: "packer init ."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-2
          role-to-assume: arn:aws:iam::560610306577:role/github-actions-role
          role-session-name: github-actions-role-session
          role-duration-seconds: 10800

      - name: Run `packer build`
        id: build
        env:
          AWS_MAX_ATTEMPTS: 240
          AWS_POLL_DELAY_SECONDS: 30
          # Verbose debug logging. PACKER_LOG enables trace output; the log is
          # also written to PACKER_LOG_PATH and uploaded as an artifact below.
          PACKER_LOG: 1
          PACKER_LOG_PATH: packer-${{ matrix.architecture }}-${{ matrix.region }}.log
        run: |
          if [ "${{ matrix.architecture }}" = "arm64" ]; then
            only="ubuntu-24_04-arm64.amazon-ebs.build_image_arm64"
            image_os="ubuntu24-arm64"
          else
            only="ubuntu-24_04.amazon-ebs.build_image"
            image_os="ubuntu24"
          fi
          packer build -var "region=${{ matrix.region }}" -only="$only" -var="image_os=$image_os" .

      - name: Upload Packer debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: packer-log-${{ matrix.architecture }}-${{ matrix.region }}
          path: images/ubuntu/templates/packer-${{ matrix.architecture }}-${{ matrix.region }}.log
          if-no-files-found: warn
